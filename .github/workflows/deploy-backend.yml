name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - '.github/workflows/deploy-prisma-migrations.yml'
  workflow_dispatch:

concurrency:
  group: kaviar-prod-backend-db-deploy
  cancel-in-progress: false
  queue: max

jobs:
  resolve-deploy-state:
    runs-on: ubuntu-latest
    outputs:
      prisma_changed: ${{ steps.detect.outputs.prisma_changed }}
      base_sha: ${{ steps.detect.outputs.base_sha }}
      backend_deploy_stale: ${{ steps.detect.outputs.backend_deploy_stale }}
      origin_main_sha: ${{ steps.detect.outputs.origin_main_sha }}
      stale_reason: ${{ steps.detect.outputs.stale_reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Prisma-related changes
        id: detect
        run: |
          set -euo pipefail

          CURRENT_SHA="${GITHUB_SHA}"
          BASE_SHA="${{ github.event.before }}"
          BACKEND_DEPLOY_STALE="false"
          STALE_REASON="none"
          ORIGIN_MAIN_SHA=""
          RELEVANT_LATER_FILES=""

          if [ "${GITHUB_EVENT_NAME}" != "push" ] || [ -z "${BASE_SHA}" ] || [[ "${BASE_SHA}" =~ ^0+$ ]]; then
            if git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
              BASE_SHA="$(git rev-parse "${GITHUB_SHA}^")"
            else
              BASE_SHA="${GITHUB_SHA}"
            fi
          fi

          if ! CHANGED_FILES=$(git diff --name-only "${BASE_SHA}" "${CURRENT_SHA}"); then
            echo "Failed to diff ${BASE_SHA}..${CURRENT_SHA}. Falling back to prisma_changed=true for safety." >&2
            PRISMA_CHANGED="true"
            CHANGED_FILES=""
          fi

          echo "Current SHA: ${CURRENT_SHA}"
          echo "Base SHA: ${BASE_SHA}"
          echo "Changed files:"
          printf '%s\n' "${CHANGED_FILES}"

          if [ -z "${PRISMA_CHANGED:-}" ]; then
            if printf '%s\n' "${CHANGED_FILES}" | rg -q '^(backend/prisma/schema\.prisma|backend/prisma/migrations/)'; then
              PRISMA_CHANGED="true"
            else
              PRISMA_CHANGED="false"
            fi
          fi

          if ! git fetch --no-tags --prune origin main; then
            BACKEND_DEPLOY_STALE="true"
            STALE_REASON="fetch_origin_main_failed"
          fi

          if [ "${BACKEND_DEPLOY_STALE}" != "true" ]; then
            ORIGIN_MAIN_SHA="$(git rev-parse origin/main 2>/dev/null || true)"
            if [ -z "${ORIGIN_MAIN_SHA}" ]; then
              BACKEND_DEPLOY_STALE="true"
              STALE_REASON="origin_main_unavailable"
            fi
          fi

          if [ "${BACKEND_DEPLOY_STALE}" != "true" ] && [ "${CURRENT_SHA}" != "${ORIGIN_MAIN_SHA}" ]; then
            if git merge-base --is-ancestor "${CURRENT_SHA}" "${ORIGIN_MAIN_SHA}"; then
              if LATER_FILES=$(git diff --name-only "${CURRENT_SHA}..${ORIGIN_MAIN_SHA}"); then
                RELEVANT_LATER_FILES="$(printf '%s\n' "${LATER_FILES}" | rg '^(backend/|\.github/workflows/deploy-backend\.yml|\.github/workflows/deploy-prisma-migrations\.yml)$' || true)"
                if [ -n "${RELEVANT_LATER_FILES}" ]; then
                  BACKEND_DEPLOY_STALE="true"
                  STALE_REASON="newer_relevant_backend_changes_on_main"
                fi
              else
                BACKEND_DEPLOY_STALE="true"
                STALE_REASON="diff_origin_main_failed"
              fi
            else
              BACKEND_DEPLOY_STALE="true"
              STALE_REASON="current_sha_not_ancestor_of_origin_main"
            fi
          fi

          echo "prisma_changed=${PRISMA_CHANGED}"
          echo "origin/main SHA: ${ORIGIN_MAIN_SHA:-unknown}"
          echo "Relevant newer backend files on origin/main:"
          if [ -n "${RELEVANT_LATER_FILES}" ]; then
            printf '%s\n' "${RELEVANT_LATER_FILES}"
          else
            echo "(none)"
          fi
          echo "backend_deploy_stale=${BACKEND_DEPLOY_STALE}"
          echo "stale_reason=${STALE_REASON}"

          echo "base_sha=${BASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "prisma_changed=${PRISMA_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "backend_deploy_stale=${BACKEND_DEPLOY_STALE}" >> "$GITHUB_OUTPUT"
          echo "origin_main_sha=${ORIGIN_MAIN_SHA}" >> "$GITHUB_OUTPUT"
          echo "stale_reason=${STALE_REASON}" >> "$GITHUB_OUTPUT"

      - name: Publish deploy-state summary
        run: |
          {
            echo "### Backend deploy state"
            echo "- GITHUB_SHA: ${{ github.sha }}"
            echo "- Base SHA for prisma diff: ${{ steps.detect.outputs.base_sha }}"
            echo "- origin/main SHA: ${{ steps.detect.outputs.origin_main_sha }}"
            echo "- prisma_changed: ${{ steps.detect.outputs.prisma_changed }}"
            echo "- backend_deploy_stale: ${{ steps.detect.outputs.backend_deploy_stale }}"
            echo "- stale_reason: ${{ steps.detect.outputs.stale_reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  run-prisma-migrations:
    needs: resolve-deploy-state
    if: needs.resolve-deploy-state.outputs.backend_deploy_stale != 'true'
    uses: ./.github/workflows/deploy-prisma-migrations.yml
    with:
      orchestrated_by_backend: true
    secrets: inherit

  deploy:
    needs:
      - resolve-deploy-state
      - run-prisma-migrations
    if: |
      needs.resolve-deploy-state.outputs.backend_deploy_stale != 'true' &&
      needs.run-prisma-migrations.result == 'success'
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install and type-check
        run: |
          cd backend
          npm ci
          npx prisma generate
          npx tsc --noEmit -p tsconfig.build.json
      
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region us-east-2 | \
          docker login --username AWS --password-stdin 847895361928.dkr.ecr.us-east-2.amazonaws.com
      
      - name: Build and Push
        run: |
          cd backend
          docker build --build-arg GIT_COMMIT=${{ github.sha }} -t kaviar-backend:${{ github.sha }} .
          docker tag kaviar-backend:${{ github.sha }} 847895361928.dkr.ecr.us-east-2.amazonaws.com/kaviar-backend:latest
          docker tag kaviar-backend:${{ github.sha }} 847895361928.dkr.ecr.us-east-2.amazonaws.com/kaviar-backend:${{ github.sha }}
          docker push 847895361928.dkr.ecr.us-east-2.amazonaws.com/kaviar-backend:latest
          docker push 847895361928.dkr.ecr.us-east-2.amazonaws.com/kaviar-backend:${{ github.sha }}
      
      - name: Update Task Definition
        run: |
          TASK_DEF=$(aws ecs describe-task-definition --task-definition kaviar-backend --region us-east-2)
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq --arg IMAGE "847895361928.dkr.ecr.us-east-2.amazonaws.com/kaviar-backend:${{ github.sha }}" --arg COMMIT "${{ github.sha }}" \
            --arg TWILIO_WHATSAPP_FROM "${{ secrets.TWILIO_WHATSAPP_FROM }}" \
            --arg TWILIO_WHATSAPP_TEMPLATE_DRIVER_SID "${{ secrets.TWILIO_WHATSAPP_TEMPLATE_DRIVER_SID }}" \
            --arg TWILIO_WHATSAPP_TEMPLATE_PASSENGER_SID "${{ secrets.TWILIO_WHATSAPP_TEMPLATE_PASSENGER_SID }}" \
            --arg TWILIO_WHATSAPP_TEMPLATE_MANAGER_SID "${{ secrets.TWILIO_WHATSAPP_TEMPLATE_MANAGER_SID }}" \
            --arg SUMUP_ENABLED "${{ secrets.SUMUP_ENABLED }}" \
            --arg SUMUP_BASE_URL "${{ secrets.SUMUP_BASE_URL }}" \
            --arg SUMUP_API_KEY "${{ secrets.SUMUP_API_KEY }}" \
            --arg SUMUP_PUBLIC_KEY "${{ secrets.SUMUP_PUBLIC_KEY }}" \
            --arg SUMUP_MERCHANT_CODE "${{ secrets.SUMUP_MERCHANT_CODE }}" '
            .taskDefinition |
            .containerDefinitions[0].image = $IMAGE |
            .containerDefinitions[0].environment = [
              .containerDefinitions[0].environment[]?
              | select(
                  .name != "GIT_COMMIT"
                  and .name != "TWILIO_WHATSAPP_FROM"
                  and .name != "TWILIO_WHATSAPP_TEMPLATE_DRIVER_SID"
                  and .name != "TWILIO_WHATSAPP_TEMPLATE_PASSENGER_SID"
                  and .name != "TWILIO_WHATSAPP_TEMPLATE_MANAGER_SID"
                  and .name != "TWILIO_WHATSAPP_ENABLED"
                  and .name != "ENABLE_TWILIO_WHATSAPP"
                  and .name != "SUMUP_ENABLED"
                  and .name != "SUMUP_BASE_URL"
                  and .name != "SUMUP_API_KEY"
                  and .name != "SUMUP_PUBLIC_KEY"
                  and .name != "SUMUP_MERCHANT_CODE"
                )
            ] |
            .containerDefinitions[0].environment += [{"name": "GIT_COMMIT", "value": $COMMIT}] |
            .containerDefinitions[0].environment += [{"name": "TWILIO_WHATSAPP_ENABLED", "value": "true"}] |
            .containerDefinitions[0].environment += [{"name": "ENABLE_TWILIO_WHATSAPP", "value": "true"}] |
            (if $TWILIO_WHATSAPP_FROM != "" then .containerDefinitions[0].environment += [{"name": "TWILIO_WHATSAPP_FROM", "value": $TWILIO_WHATSAPP_FROM}] else . end) |
            (if $TWILIO_WHATSAPP_TEMPLATE_DRIVER_SID != "" then .containerDefinitions[0].environment += [{"name": "TWILIO_WHATSAPP_TEMPLATE_DRIVER_SID", "value": $TWILIO_WHATSAPP_TEMPLATE_DRIVER_SID}] else . end) |
            (if $TWILIO_WHATSAPP_TEMPLATE_PASSENGER_SID != "" then .containerDefinitions[0].environment += [{"name": "TWILIO_WHATSAPP_TEMPLATE_PASSENGER_SID", "value": $TWILIO_WHATSAPP_TEMPLATE_PASSENGER_SID}] else . end) |
            (if $TWILIO_WHATSAPP_TEMPLATE_MANAGER_SID != "" then .containerDefinitions[0].environment += [{"name": "TWILIO_WHATSAPP_TEMPLATE_MANAGER_SID", "value": $TWILIO_WHATSAPP_TEMPLATE_MANAGER_SID}] else . end) |
            (if $SUMUP_ENABLED != "" then .containerDefinitions[0].environment += [{"name": "SUMUP_ENABLED", "value": $SUMUP_ENABLED}] else . end) |
            (if $SUMUP_BASE_URL != "" then .containerDefinitions[0].environment += [{"name": "SUMUP_BASE_URL", "value": $SUMUP_BASE_URL}] else . end) |
            (if $SUMUP_API_KEY != "" then .containerDefinitions[0].environment += [{"name": "SUMUP_API_KEY", "value": $SUMUP_API_KEY}] else . end) |
            (if $SUMUP_PUBLIC_KEY != "" then .containerDefinitions[0].environment += [{"name": "SUMUP_PUBLIC_KEY", "value": $SUMUP_PUBLIC_KEY}] else . end) |
            (if $SUMUP_MERCHANT_CODE != "" then .containerDefinitions[0].environment += [{"name": "SUMUP_MERCHANT_CODE", "value": $SUMUP_MERCHANT_CODE}] else . end) |
            .containerDefinitions[0].healthCheck = {
              "command": ["CMD-SHELL", "node /app/healthcheck.js"],
              "interval": 30,
              "timeout": 5,
              "retries": 3,
              "startPeriod": 60
            } |
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ')
          echo "$NEW_TASK_DEF" > task-def.json
          
          # Safety check: ensure sensitive values are NOT in environment (they must stay in secrets/SSM)
          LEAKED=$(echo "$NEW_TASK_DEF" | jq -r '[.containerDefinitions[0].environment[]?.name] | map(select(. == "DATABASE_URL" or . == "JWT_SECRET" or . == "JWT_RESET_SECRET" or . == "ADMIN_DEFAULT_PASSWORD" or . == "ASAAS_API_KEY" or . == "MERCADOPAGO_ACCESS_TOKEN" or . == "GOOGLE_PLACES_KEY")) | join(",")')
          if [ -n "$LEAKED" ]; then
            echo "❌ ABORT: Sensitive values found in plaintext environment: $LEAKED"
            exit 1
          fi
          
          echo "Secrets in SSM (preserved):"
          echo "$NEW_TASK_DEF" | jq -r '.containerDefinitions[0].secrets[]?.name' | sort
          echo "TWILIO_WHATSAPP_TEMPLATE_* env vars (preserved):"
          echo "$NEW_TASK_DEF" | jq -r '.containerDefinitions[0].environment[]? | select(.name | startswith("TWILIO_WHATSAPP_TEMPLATE_")) | .name' | sort
          
          NEW_REV=$(aws ecs register-task-definition --cli-input-json file://task-def.json --region us-east-2 | jq -r '.taskDefinition.revision')
          echo "Registered task definition: kaviar-backend:${NEW_REV}"
          echo "task_revision=${NEW_REV}" >> $GITHUB_OUTPUT
        id: register_task
      
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster kaviar-cluster \
            --service kaviar-backend-service \
            --task-definition kaviar-backend:${{ steps.register_task.outputs.task_revision }} \
            --force-new-deployment \
            --region us-east-2
      
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster kaviar-cluster \
            --services kaviar-backend-service \
            --region us-east-2
