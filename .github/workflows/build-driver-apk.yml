name: Build Driver APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Install eas-cli
        run: npm install -g eas-cli

      - name: Decode keystore
        run: |
          mkdir -p credentials/android
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > credentials/android/keystore.jks

      - name: Create credentials.json
        run: |
          cat <<EOF > credentials.json
          {
            "android": {
              "keystore": {
                "keystorePath": "credentials/android/keystore.jks",
                "keystorePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
                "keyAlias": "${{ secrets.KEY_ALIAS }}",
                "keyPassword": "${{ secrets.KEY_PASSWORD }}"
              }
            }
          }
          EOF

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json

      - name: Verify env vars
        run: |
          test -n "$GOOGLE_MAPS_API_KEY" || (echo "GOOGLE_MAPS_API_KEY is empty" && exit 1)
          test -n "$EXPO_TOKEN" || (echo "EXPO_TOKEN is empty" && exit 1)

      - name: Build APK locally
        run: eas build --profile driver-apk --platform android --local --non-interactive --output ./driver.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kaviar-driver-1.11.26-fix-register-inputs
          path: ./driver.apk
          retention-days: 30
