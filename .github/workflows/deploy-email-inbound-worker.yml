name: Deploy Email Inbound Worker

on:
  push:
    branches: [main]
    paths:
      - 'cloudflare/email-inbound-worker/**'
      - '.github/workflows/deploy-email-inbound-worker.yml'
  workflow_dispatch:

concurrency:
  group: kaviar-email-inbound-worker-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: cloudflare/email-inbound-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cloudflare/email-inbound-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run worker tests
        run: npm test

      - name: Deploy with Wrangler
        run: npx wrangler deploy --config wrangler.toml src/index.js
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INBOUND_EMAIL_WEBHOOK_SECRET: ${{ secrets.INBOUND_EMAIL_WEBHOOK_SECRET }}