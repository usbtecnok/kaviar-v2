<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>KAVIAR — Acompanhar corrida</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
  #map { width: 100%; height: 60vh; min-height: 300px; }
  .info { padding: 16px; max-width: 600px; margin: 0 auto; }
  .status-bar { padding: 12px 16px; text-align: center; font-weight: 700; font-size: 15px; }
  .status-active { background: #27ae60; }
  .status-arrived { background: #D4AF37; color: #000; }
  .status-ended { background: #555; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 16px; margin-top: 12px; }
  .card-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .label { color: #888; font-size: 12px; text-transform: uppercase; }
  .value { font-size: 15px; font-weight: 600; }
  .brand { text-align: center; padding: 20px; color: #D4AF37; font-weight: 800; font-size: 18px; letter-spacing: 2px; }
  .error { text-align: center; padding: 60px 20px; }
  .error h2 { color: #D4AF37; margin-bottom: 8px; }
  .error p { color: #888; }
  .pulse { display: inline-block; width: 8px; height: 8px; background: #27ae60; border-radius: 50%; margin-right: 6px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="brand">KAVIAR</div>
<div id="status-bar" class="status-bar status-active"></div>
<div id="map"></div>
<div class="info" id="info"></div>
<div class="error" id="error" style="display:none">
  <h2>Link inválido ou expirado</h2>
  <p>Esta corrida não está mais disponível para acompanhamento.</p>
</div>

<script>
const API = 'https://api.kaviar.com.br';
const token = window.location.pathname.split('/track/')[1];
if (!token) { document.getElementById('error').style.display = 'block'; document.getElementById('map').style.display = 'none'; }

let map, marker, firstLoad = true;

function initMap() {
  map = L.map('map').setView([-22.9068, -43.1729], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

function updateMarker(lat, lng, label) {
  if (!map) return;
  if (!marker) {
    marker = L.marker([lat, lng]).addTo(map);
    marker.bindPopup(label);
  } else {
    marker.setLatLng([lat, lng]);
    marker.setPopupContent(label);
  }
  if (firstLoad) { map.setView([lat, lng], 15); firstLoad = false; }
}

async function poll() {
  try {
    const resp = await fetch(`${API}/api/public/ride-track/${token}`);
    if (!resp.ok) {
      document.getElementById('error').style.display = 'block';
      document.getElementById('map').style.display = 'none';
      document.getElementById('status-bar').style.display = 'none';
      document.getElementById('info').style.display = 'none';
      return;
    }
    const { data } = await resp.json();

    // Status bar
    const sb = document.getElementById('status-bar');
    sb.textContent = data.status_label;
    sb.className = 'status-bar ' + (data.status === 'arrived' ? 'status-arrived' : data.is_active ? 'status-active' : 'status-ended');
    if (data.is_active) sb.innerHTML = '<span class="pulse"></span>' + data.status_label;

    // Map
    if (data.driver?.lat && data.driver?.lng) {
      updateMarker(data.driver.lat, data.driver.lng, data.driver.first_name + (data.driver.vehicle ? ' • ' + data.driver.vehicle : ''));
    }

    // Info
    const info = document.getElementById('info');
    info.innerHTML = `
      <div class="card">
        <div class="card-row"><div><span class="label">Motorista</span><div class="value">${data.driver?.first_name || '—'}</div></div><div style="text-align:right"><span class="label">Veículo</span><div class="value">${data.driver?.vehicle || '—'}${data.driver?.plate ? ' • ' + data.driver.plate : ''}</div></div></div>
        <div class="card-row"><div><span class="label">Passageiro</span><div class="value">${data.passenger_first_name || '—'}</div></div></div>
        <div class="card-row"><div><span class="label">Origem</span><div class="value">${data.origin_neighborhood || '—'}</div></div><div style="text-align:right"><span class="label">Destino</span><div class="value">${data.dest_neighborhood || '—'}</div></div></div>
      </div>
    `;

    if (!data.is_active) return; // Stop polling
    setTimeout(poll, 5000);
  } catch {
    setTimeout(poll, 10000); // Retry on error
  }
}

if (token) { initMap(); poll(); }
</script>
</body>
</html>
