<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
<rect width="380" height="260" rx="10" fill="#141414"/>
<!-- Banco traseiro -->
<path d="M30,180 Q30,130 50,120 L330,120 Q350,130 350,180 L350,230 L30,230 Z" fill="#1E1E1E" stroke="#333" stroke-width="1"/>
<!-- Capa protetora instalada -->
<rect x="35" y="125" width="310" height="100" rx="5" fill="#1A2A1A" stroke="#2D6B4F" stroke-width="1.5" stroke-dasharray="0"/>
<!-- Kit items -->
<!-- Borrifador desinfetante -->
<rect x="60" y="150" width="16" height="45" rx="4" fill="#2D6B4F"/>
<rect x="57" y="145" width="22" height="12" rx="3" fill="#1A4A3A"/>
<text x="68" y="210" font-family="Arial,sans-serif" font-size="8" fill="#999" text-anchor="middle">Desinf.</text>
<!-- Pano/toalha -->
<rect x="110" y="160" width="40" height="30" rx="3" fill="#3A5A4A"/>
<path d="M115,165 L145,165 L145,185 L115,185 Z" fill="#4A7A5A" opacity="0.5"/>
<text x="130" y="210" font-family="Arial,sans-serif" font-size="8" fill="#999" text-anchor="middle">Pano</text>
<!-- Cinto pet -->
<path d="M180,155 Q195,150 210,155 L210,185 Q195,190 180,185 Z" fill="none" stroke="#C9A84C" stroke-width="2"/>
<rect x="190" y="170" width="12" height="8" rx="2" fill="#B8942E"/>
<text x="195" y="210" font-family="Arial,sans-serif" font-size="8" fill="#999" text-anchor="middle">Cinto</text>
<!-- Saco para resíduos -->
<path d="M250,155 Q260,150 270,155 L275,190 Q260,195 245,190 Z" fill="#333" stroke="#666" stroke-width="1"/>
<text x="260" y="210" font-family="Arial,sans-serif" font-size="8" fill="#999" text-anchor="middle">Sacos</text>
<!-- Água -->
<rect x="300" y="155" width="20" height="38" rx="4" fill="#1A3A5A" stroke="#4A8ABF" stroke-width="1"/>
<ellipse cx="310" cy="155" rx="10" ry="3" fill="#1A3A5A" stroke="#4A8ABF" stroke-width="1"/>
<text x="310" y="210" font-family="Arial,sans-serif" font-size="8" fill="#999" text-anchor="middle">Água</text>
<!-- Checkmark geral -->
<circle cx="340" cy="80" r="15" fill="none" stroke="#2D6B4F" stroke-width="2"/>
<path d="M332,80 L338,86 L350,74" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
<!-- Label -->
<text x="190" y="248" font-family="Arial,sans-serif" font-size="11" fill="#B8942E" text-anchor="middle" letter-spacing="1">KIT PET — BANCO TRASEIRO</text>
</svg>
