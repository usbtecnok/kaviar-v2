<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
<rect width="380" height="260" rx="10" fill="#141414"/>
<!-- Carro (lateral, porta aberta) -->
<path d="M180,200 L350,200 L350,120 Q340,100 320,95 L240,95 Q220,100 210,120 L180,120 Z" fill="#1E1E1E" stroke="#333" stroke-width="1.5"/>
<!-- Porta aberta -->
<path d="M180,120 L180,200 L140,195 L140,125 Z" fill="#252525" stroke="#333" stroke-width="1"/>
<!-- Interior visível -->
<rect x="185" y="150" width="160" height="45" rx="5" fill="#1A2A1A" stroke="#2D6B4F" stroke-width="1"/>
<!-- Tutor (silhueta elegante) -->
<circle cx="100" cy="90" r="16" fill="#2A2A2A"/>
<path d="M85,110 Q90,105 100,105 Q110,105 115,110 L120,170 Q110,175 100,175 Q90,175 80,170 Z" fill="#2A2A2A"/>
<!-- Braço do tutor guiando -->
<path d="M115,130 Q130,140 145,155" fill="none" stroke="#3A3A3A" stroke-width="6" stroke-linecap="round"/>
<!-- Guia/coleira (dourada) -->
<path d="M145,155 Q155,160 165,165" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round"/>
<!-- Cão entrando no carro -->
<ellipse cx="170" cy="175" rx="22" ry="16" fill="#2A2A2A"/>
<ellipse cx="155" cy="165" rx="12" ry="10" fill="#2A2A2A"/>
<!-- Orelhas -->
<path d="M148,157 Q144,148 150,152" fill="#333"/>
<path d="M160,157 Q164,148 158,152" fill="#333"/>
<!-- Olho -->
<circle cx="153" cy="163" r="2" fill="#C9A84C"/>
<!-- Patas -->
<rect x="158" y="188" width="5" height="10" rx="2" fill="#2A2A2A"/>
<rect x="172" y="188" width="5" height="10" rx="2" fill="#2A2A2A"/>
<!-- Seta de direção -->
<path d="M130,180 L155,180" fill="none" stroke="#B8942E" stroke-width="1.5" marker-end="url(#arrow)"/>
<defs><marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#B8942E"/></marker></defs>
<!-- Label -->
<text x="190" y="248" font-family="Arial,sans-serif" font-size="11" fill="#B8942E" text-anchor="middle" letter-spacing="1">EMBARQUE SEGURO DO PET</text>
</svg>
