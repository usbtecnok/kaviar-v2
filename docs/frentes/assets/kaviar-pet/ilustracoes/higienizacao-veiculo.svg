<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
<!-- Fundo escuro premium -->
<rect width="380" height="260" rx="10" fill="#141414"/>
<!-- Interior do carro (banco traseiro visto de cima/lateral) -->
<rect x="40" y="80" width="200" height="140" rx="8" fill="#1E1E1E" stroke="#333" stroke-width="1"/>
<!-- Capa protetora no banco -->
<rect x="45" y="85" width="190" height="130" rx="6" fill="#222" stroke="#2D6B4F" stroke-width="1" opacity="0.6"/>
<!-- Silhueta do motorista (braço limpando) -->
<path d="M280,60 Q300,70 310,90 L305,100 Q295,95 285,85 L275,70 Z" fill="#2A2A2A"/>
<!-- Braço -->
<path d="M285,85 Q270,110 260,130 L255,140" fill="none" stroke="#3A3A3A" stroke-width="8" stroke-linecap="round"/>
<!-- Mão com pano -->
<ellipse cx="255" cy="145" rx="12" ry="8" fill="#3A3A3A"/>
<rect x="243" y="140" width="25" height="15" rx="3" fill="#4A7A5A" opacity="0.8"/>
<!-- Borrifador -->
<rect x="310" y="120" width="14" height="40" rx="4" fill="#2D6B4F"/>
<rect x="308" y="115" width="18" height="10" rx="3" fill="#1A4A3A"/>
<path d="M318,120 L330,110 L332,112 L320,122" fill="#2D6B4F"/>
<!-- Spray particles -->
<circle cx="240" cy="125" r="2" fill="#4CAF50" opacity="0.4"/>
<circle cx="235" cy="118" r="1.5" fill="#4CAF50" opacity="0.3"/>
<circle cx="245" cy="115" r="1" fill="#4CAF50" opacity="0.5"/>
<circle cx="230" cy="122" r="1.5" fill="#4CAF50" opacity="0.3"/>
<!-- Pelos sendo removidos (indicação visual) -->
<path d="M80,120 Q85,118 90,120" fill="none" stroke="#666" stroke-width="0.5" opacity="0.5"/>
<path d="M120,140 Q125,138 130,140" fill="none" stroke="#666" stroke-width="0.5" opacity="0.5"/>
<path d="M100,160 Q105,158 110,160" fill="none" stroke="#666" stroke-width="0.5" opacity="0.5"/>
<!-- Timer -->
<circle cx="340" cy="200" r="18" fill="none" stroke="#B8942E" stroke-width="2"/>
<line x1="340" y1="200" x2="340" y2="188" stroke="#B8942E" stroke-width="2" stroke-linecap="round"/>
<line x1="340" y1="200" x2="348" y2="203" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
<text x="340" y="230" font-family="Arial,sans-serif" font-size="10" fill="#B8942E" text-anchor="middle">2-3 min</text>
<!-- Label -->
<text x="190" y="248" font-family="Arial,sans-serif" font-size="11" fill="#B8942E" text-anchor="middle" letter-spacing="1">HIGIENIZAÇÃO PÓS-CORRIDA</text>
</svg>
