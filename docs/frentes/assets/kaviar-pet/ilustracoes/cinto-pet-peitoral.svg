<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="380" height="260">
<!-- Fundo escuro premium -->
<rect width="380" height="260" rx="10" fill="#141414"/>
<!-- Banco traseiro (silhueta) -->
<path d="M40,200 Q40,140 60,130 L320,130 Q340,140 340,200 L340,240 L40,240 Z" fill="#1E1E1E" stroke="#333" stroke-width="1"/>
<!-- Encosto do banco -->
<path d="M50,130 Q50,80 70,70 L310,70 Q330,80 330,130" fill="#252525" stroke="#333" stroke-width="1"/>
<!-- Cinto de segurança (dourado) -->
<path d="M260,75 Q270,100 265,140 L260,180" fill="none" stroke="#B8942E" stroke-width="3" stroke-linecap="round"/>
<!-- Clip/fivela do cinto pet -->
<rect x="250" y="175" width="20" height="12" rx="3" fill="#C9A84C"/>
<rect x="255" y="172" width="10" height="4" rx="2" fill="#8B6914"/>
<!-- Peitoral do cão (linhas douradas) -->
<path d="M150,155 Q170,145 190,150 Q210,155 220,165 Q230,180 225,195 Q215,205 200,200 Q180,195 165,185 Q150,175 150,155 Z" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
<path d="M170,148 L180,135 Q190,130 200,135 L210,148" fill="none" stroke="#C9A84C" stroke-width="2"/>
<!-- Conexão cinto → peitoral -->
<line x1="255" y1="181" x2="222" y2="170" stroke="#F4D675" stroke-width="2" stroke-dasharray="4,2"/>
<!-- Silhueta do cão (elegante) -->
<ellipse cx="185" cy="170" rx="35" ry="28" fill="#2A2A2A"/>
<!-- Cabeça do cão -->
<ellipse cx="155" cy="148" rx="18" ry="15" fill="#2A2A2A"/>
<ellipse cx="148" cy="140" rx="6" ry="8" fill="#2A2A2A"/>
<!-- Olho -->
<circle cx="158" cy="146" r="2" fill="#C9A84C"/>
<!-- Orelhas -->
<path d="M145,132 Q140,120 148,125" fill="#333"/>
<path d="M162,132 Q167,120 160,125" fill="#333"/>
<!-- Label -->
<text x="190" y="248" font-family="Arial,sans-serif" font-size="11" fill="#B8942E" text-anchor="middle" letter-spacing="1">CINTO PET → PEITORAL</text>
</svg>
