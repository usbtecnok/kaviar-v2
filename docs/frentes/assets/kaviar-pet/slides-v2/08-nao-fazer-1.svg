<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1A1A1A"/><stop offset="100%" style="stop-color:#2A2A2A"/></linearGradient></defs>
<rect width="960" height="540" fill="url(#bg)"/>
<rect x="0" y="0" width="960" height="3" fill="#B8942E"/>
<text x="40" y="45" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="14" fill="#B8942E" letter-spacing="2">KAVIAR Pet</text>
<text x="880" y="45" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="13" fill="#999" text-anchor="end">Vídeo 2 | 8/16</text>
<line x1="40" y1="60" x2="920" y2="60" stroke="#333" stroke-width="0.5"/>
<rect x="0" y="75" width="5" height="400" fill="#C0392B" opacity="0.5"/>
<text x="480" y="105" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="26" fill="#C0392B" text-anchor="middle">O QUE NÃO FAZER</text>
<text x="150" y="155" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Transportar animal sem tutor presente</text>
<text x="150" y="190" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Aceitar animal sem contenção (sem guia/caixa)</text>
<text x="150" y="225" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Deixar animal no banco da frente</text>
<text x="150" y="260" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Abrir janela — pet não pode colocar cabeça para fora</text>
<text x="150" y="295" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Deixar pet solto sem cinto de segurança</text>
<text x="150" y="330" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Dar comida/água sem autorização do tutor</text>
<text x="150" y="365" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Pegar o animal no colo</text>
<text x="150" y="400" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Gritar ou repreender o animal</text>
<text x="150" y="435" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="17" fill="#EEE">❌  Cobrar taxa diretamente do tutor</text>
<text x="150" y="465" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="14" fill="#999">continua →</text>
<rect x="0" y="490" width="960" height="50" fill="#111"/><rect x="0" y="490" width="960" height="1" fill="#B8942E" opacity="0.4"/>
<text x="480" y="520" font-family="Montserrat,Arial,sans-serif" font-weight="600" font-size="13" fill="#B8942E" text-anchor="middle" letter-spacing="3">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
<rect x="0" y="537" width="960" height="3" fill="#B8942E"/>
</svg>
