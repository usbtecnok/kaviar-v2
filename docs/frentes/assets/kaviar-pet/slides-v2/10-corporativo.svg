<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1A1A1A"/><stop offset="100%" style="stop-color:#2A2A2A"/></linearGradient></defs>
<rect width="960" height="540" fill="url(#bg)"/>
<rect x="0" y="0" width="960" height="3" fill="#B8942E"/>
<text x="40" y="45" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="14" fill="#B8942E" letter-spacing="2">KAVIAR Pet</text>
<text x="880" y="45" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="13" fill="#999" text-anchor="end">Vídeo 2 | 10/16</text>
<line x1="40" y1="60" x2="920" y2="60" stroke="#333" stroke-width="0.5"/>
<text x="480" y="100" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="24" fill="#FFF" text-anchor="middle">CLIENTES CORPORATIVOS</text>
<text x="480" y="135" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="18" fill="#999" text-anchor="middle">Veterinárias · Creches pet · Pet shops · Parceiros</text>
<!-- Card principal -->
<rect x="80" y="160" width="800" height="70" rx="8" fill="#222" stroke="#B8942E" stroke-width="1.5"/>
<text x="480" y="195" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="20" fill="#EEE" text-anchor="middle">🏢  A entrega pode ser diferente do cliente comum.</text>
<text x="480" y="220" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="17" fill="#CCC" text-anchor="middle">A Central orienta caso a caso.</text>
<!-- Dois cards grandes lado a lado -->
<rect x="80" y="255" width="400" height="170" rx="10" fill="#222" stroke="#2D6B4F" stroke-width="2"/>
<text x="280" y="300" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="20" fill="#2D6B4F" text-anchor="middle">CLIENTE COMUM</text>
<text x="280" y="340" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">Entrega na porta</text>
<text x="280" y="375" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">Sem entrar no imóvel</text>
<text x="280" y="410" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="16" fill="#999" text-anchor="middle">Aguardar tutor receber o pet</text>
<rect x="500" y="255" width="400" height="170" rx="10" fill="#222" stroke="#D4A843" stroke-width="2"/>
<text x="700" y="300" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="20" fill="#D4A843" text-anchor="middle">CORPORATIVO</text>
<text x="700" y="340" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">Pode entrar no</text>
<text x="700" y="375" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">estabelecimento</text>
<text x="700" y="410" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="16" fill="#999" text-anchor="middle">Conforme orientação da Central</text>
<rect x="0" y="490" width="960" height="50" fill="#111"/><rect x="0" y="490" width="960" height="1" fill="#B8942E" opacity="0.4"/>
<text x="480" y="520" font-family="Montserrat,Arial,sans-serif" font-weight="600" font-size="13" fill="#B8942E" text-anchor="middle" letter-spacing="3">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
<rect x="0" y="537" width="960" height="3" fill="#B8942E"/>
</svg>
