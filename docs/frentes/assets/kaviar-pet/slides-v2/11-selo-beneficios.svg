<text x="480" y="105" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="26" fill="#FFF" text-anchor="middle">SELO E BENEFÍCIOS</text>
<text x="150" y="160" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#2D6B4F">✅  Corridas exclusivas que motoristas comuns não recebem</text>
<text x="150" y="200" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#2D6B4F">✅  Taxa pet adicional por corrida (R$5-8 a mais)</text>
