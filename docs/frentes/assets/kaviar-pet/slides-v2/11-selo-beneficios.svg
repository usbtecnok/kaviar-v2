<text x="180" y="370" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="16" fill="#CCC">• Reclamações graves de tutores</text>
<text x="180" y="395" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="16" fill="#CCC">• Itens não mantidos em condições</text>
<text x="180" y="420" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="16" fill="#CCC">• Descumprimento do protocolo</text>
