<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
<defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1A1A1A"/><stop offset="100%" style="stop-color:#2A2A2A"/></linearGradient></defs>
<rect width="960" height="540" fill="url(#bg)"/>
<rect x="0" y="0" width="960" height="3" fill="#B8942E"/>
<text x="40" y="45" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="14" fill="#B8942E" letter-spacing="2">KAVIAR Pet</text>
<text x="880" y="45" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="13" fill="#999" text-anchor="end">Vídeo 2 | 5/16</text>
<line x1="40" y1="60" x2="920" y2="60" stroke="#333" stroke-width="0.5"/>
<text x="480" y="100" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="24" fill="#FFF" text-anchor="middle">ATENDIMENTO AO TUTOR</text>
<text x="480" y="130" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="17" fill="#999" text-anchor="middle">O tutor é seu cliente. Respeito e paciência.</text>
<!-- Frases positivas - maiores -->
<rect x="80" y="150" width="800" height="55" rx="8" fill="#1A2A1A" stroke="#2D6B4F" stroke-width="1.5"/>
<text x="480" y="184" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">💬 "Pode ficar tranquilo, estou preparado para transportar pets."</text>
<rect x="80" y="218" width="800" height="55" rx="8" fill="#1A2A1A" stroke="#2D6B4F" stroke-width="1.5"/>
<text x="480" y="252" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">💬 "O banco está protegido, sem problema."</text>
<rect x="80" y="286" width="800" height="55" rx="8" fill="#1A2A1A" stroke="#2D6B4F" stroke-width="1.5"/>
<text x="480" y="320" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE" text-anchor="middle">💬 "Se precisar de algo durante a corrida, é só falar."</text>
<!-- Proibições -->
<rect x="80" y="360" width="800" height="100" rx="8" fill="#1F1515" stroke="#C0392B" stroke-width="1"/>
<text x="480" y="395" font-family="Inter,Arial,sans-serif" font-weight="600" font-size="19" fill="#C0392B" text-anchor="middle">❌  Não fazer comentários negativos sobre o animal</text>
<text x="480" y="430" font-family="Inter,Arial,sans-serif" font-weight="600" font-size="19" fill="#C0392B" text-anchor="middle">❌  Não oferecer comida/água sem autorização do tutor</text>
<rect x="0" y="490" width="960" height="50" fill="#111"/><rect x="0" y="490" width="960" height="1" fill="#B8942E" opacity="0.4"/>
<text x="480" y="520" font-family="Montserrat,Arial,sans-serif" font-weight="600" font-size="13" fill="#B8942E" text-anchor="middle" letter-spacing="3">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
<rect x="0" y="537" width="960" height="3" fill="#B8942E"/>
</svg>
