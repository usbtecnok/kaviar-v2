<text x="480" y="110" font-family="Montserrat,Arial,sans-serif" font-weight="700" font-size="26" fill="#FFF" text-anchor="middle">📸 FOTO OBRIGATÓRIA DE EMBARQUE</text>
<text x="480" y="170" font-family="Inter,Arial,sans-serif" font-weight="400" font-size="20" fill="#EEE" text-anchor="middle">Antes de iniciar, tire foto do pet e envie à Central.</text>
