<text x="200" y="375" font-family="Inter,Arial,sans-serif" font-weight="500" font-size="19" fill="#EEE">✓  Condição de transporte (capa, caixa)</text>
<rect x="150" y="405" width="660" height="50" rx="8" fill="#1F1A10" stroke="#B8942E" stroke-width="1.5"/>
<text x="480" y="435" font-family="Inter,Arial,sans-serif" font-weight="600" font-size="16" fill="#B8942E" text-anchor="middle">Essa foto é sua proteção operacional em caso de divergência ou dano</text>
<rect x="0" y="490" width="960" height="50" fill="#111"/><rect x="0" y="490" width="960" height="1" fill="#B8942E" opacity="0.4"/>
