<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" style="stop-color:#0D0D0D"/>
<stop offset="50%" style="stop-color:#1A1A2E"/>
<stop offset="100%" style="stop-color:#0D0D0D"/>
</linearGradient>
<linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#C9A84C"/>
<stop offset="50%" style="stop-color:#F4D675"/>
<stop offset="100%" style="stop-color:#C9A84C"/>
</linearGradient>
</defs>
<rect width="1080" height="1920" fill="url(#bg)"/>
<!-- Header -->
<text x="540" y="620" font-family="Arial, sans-serif" font-size="28" fill="#F4D675" text-anchor="middle" letter-spacing="2">NESTE TREINAMENTO</text>
<!-- Título -->
<text x="540" y="750" font-family="Arial, sans-serif" font-size="58" fill="#FFFFFF" text-anchor="middle" font-weight="bold">O QUE VOCÊ</text>
<text x="540" y="825" font-family="Arial, sans-serif" font-size="58" fill="#FFFFFF" text-anchor="middle" font-weight="bold">VAI APRENDER</text>
<!-- Bullets grandes -->
<text x="120" y="1000" font-family="Arial, sans-serif" font-size="42" fill="#FFFFFF">🛡️</text>
<text x="190" y="1000" font-family="Arial, sans-serif" font-size="36" fill="#EEEEEE">Segurança no transporte</text>
<rect x="120" y="1040" width="840" height="1" fill="#333333"/>
<text x="120" y="1130" font-family="Arial, sans-serif" font-size="42" fill="#FFFFFF">📋</text>
<text x="190" y="1130" font-family="Arial, sans-serif" font-size="36" fill="#EEEEEE">Protocolo operacional</text>
<rect x="120" y="1170" width="840" height="1" fill="#333333"/>
<text x="120" y="1260" font-family="Arial, sans-serif" font-size="42" fill="#FFFFFF">📝</text>
<text x="190" y="1260" font-family="Arial, sans-serif" font-size="36" fill="#EEEEEE">Questionário (nota mín. 7/10)</text>
<!-- Duração -->
<rect x="340" y="1400" width="400" height="60" rx="30" fill="none" stroke="#F4D675" stroke-width="2"/>
<text x="540" y="1438" font-family="Arial, sans-serif" font-size="26" fill="#F4D675" text-anchor="middle" font-weight="bold">⏱ ~10 minutos</text>
<!-- Footer -->
<text x="540" y="1780" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="middle" letter-spacing="2">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
</svg>
