<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" style="stop-color:#0D0D0D"/>
<stop offset="50%" style="stop-color:#1A1A2E"/>
<stop offset="100%" style="stop-color:#0D0D0D"/>
</linearGradient>
<linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" style="stop-color:#C9A84C"/>
<stop offset="50%" style="stop-color:#F4D675"/>
<stop offset="100%" style="stop-color:#C9A84C"/>
</linearGradient>
</defs>
<rect width="1080" height="1920" fill="url(#bg)"/>
<!-- Header -->
<text x="540" y="600" font-family="Arial, sans-serif" font-size="28" fill="#F4D675" text-anchor="middle" letter-spacing="2">ENTENDA</text>
<!-- Título -->
<text x="540" y="740" font-family="Arial, sans-serif" font-size="52" fill="#FFFFFF" text-anchor="middle" font-weight="bold">POR QUE TRANSPORTE</text>
<text x="540" y="810" font-family="Arial, sans-serif" font-size="52" fill="#FFFFFF" text-anchor="middle" font-weight="bold">PET É DIFERENTE?</text>
<!-- Bullets com destaque -->
<circle cx="140" cy="980" r="8" fill="#F4D675"/>
<text x="175" y="992" font-family="Arial, sans-serif" font-size="34" fill="#EEEEEE">O animal não entende o</text>
<text x="175" y="1035" font-family="Arial, sans-serif" font-size="34" fill="#EEEEEE">que está acontecendo</text>
<circle cx="140" cy="1130" r="8" fill="#F4D675"/>
<text x="175" y="1142" font-family="Arial, sans-serif" font-size="34" fill="#EEEEEE">Pode ficar ansioso ou</text>
<text x="175" y="1185" font-family="Arial, sans-serif" font-size="34" fill="#EEEEEE">assustado</text>
<circle cx="140" cy="1280" r="8" fill="#F4D675"/>
<text x="175" y="1292" font-family="Arial, sans-serif" font-size="34" fill="#EEEEEE">Freadas e curvas afetam</text>
<text x="175" y="1335" font-family="Arial, sans-serif" font-size="34" fill="#EEEEEE">mais o animal</text>
<!-- Destaque final -->
<rect x="100" y="1440" width="880" height="80" rx="12" fill="#1A2A1A" stroke="#4CAF50" stroke-width="2"/>
<text x="540" y="1490" font-family="Arial, sans-serif" font-size="28" fill="#4CAF50" text-anchor="middle" font-weight="bold">Motorista preparado = corrida tranquila ✓</text>
<!-- Footer -->
<text x="540" y="1780" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="middle" letter-spacing="2">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
</svg>
