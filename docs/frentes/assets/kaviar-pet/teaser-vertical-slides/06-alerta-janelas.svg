<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
<defs>
<linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" style="stop-color:#1A0A0A"/>
<stop offset="50%" style="stop-color:#2A1010"/>
<stop offset="100%" style="stop-color:#1A0A0A"/>
</linearGradient>
</defs>
<rect width="1080" height="1920" fill="url(#bg)"/>
<!-- Ícone alerta grande -->
<text x="540" y="650" font-family="Arial, sans-serif" font-size="120" text-anchor="middle">⚠️</text>
<!-- ATENÇÃO -->
<text x="540" y="800" font-family="Arial, sans-serif" font-size="60" fill="#FF5252" text-anchor="middle" font-weight="bold" letter-spacing="4">ATENÇÃO</text>
<!-- Mensagem principal -->
<text x="540" y="970" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">Pet NÃO pode</text>
<text x="540" y="1040" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">colocar a cabeça</text>
<text x="540" y="1110" font-family="Arial, sans-serif" font-size="48" fill="#FFFFFF" text-anchor="middle" font-weight="bold">para fora da janela</text>
<!-- Regra -->
<rect x="140" y="1200" width="800" height="2" fill="#FF5252" opacity="0.5"/>
<text x="540" y="1290" font-family="Arial, sans-serif" font-size="32" fill="#CCCCCC" text-anchor="middle">Janelas fechadas ou</text>
<text x="540" y="1340" font-family="Arial, sans-serif" font-size="32" fill="#CCCCCC" text-anchor="middle">abertura mínima.</text>
<text x="540" y="1420" font-family="Arial, sans-serif" font-size="32" fill="#CCCCCC" text-anchor="middle">Ar-condicionado ligado.</text>
<!-- Alerta responsabilidade -->
<rect x="140" y="1500" width="800" height="70" rx="12" fill="#2A1010" stroke="#FF5252" stroke-width="2"/>
<text x="540" y="1544" font-family="Arial, sans-serif" font-size="24" fill="#FF5252" text-anchor="middle" font-weight="bold">⚠ Risco de acidente — responsabilidade do motorista</text>
<!-- Footer -->
<text x="540" y="1780" font-family="Arial, sans-serif" font-size="20" fill="#666666" text-anchor="middle" letter-spacing="2">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
</svg>
