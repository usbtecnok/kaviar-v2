<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg2)"/>
  
  <!-- Linha dourada superior -->
  <rect x="0" y="0" width="960" height="3" fill="#B8942E"/>
  
  <!-- Header -->
  <text x="40" y="45" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="14" fill="#B8942E" letter-spacing="2">KAVIAR Pet</text>
  <text x="880" y="45" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="13" fill="#999999" text-anchor="end">Vídeo 1 | 12/22</text>
  
  <!-- Separador header -->
  <line x1="40" y1="60" x2="920" y2="60" stroke="#333333" stroke-width="0.5"/>
  
  <!-- Título -->
  <text x="480" y="105" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="28" fill="#FFFFFF" text-anchor="middle">CHECKLIST ANTES DA CORRIDA PET</text>
  
  <!-- Itens do checklist - tamanho maior para mobile -->
  <!-- Item 1 -->
  <rect x="120" y="135" width="28" height="28" rx="5" fill="#2D6B4F" opacity="0.2" stroke="#2D6B4F" stroke-width="2"/>
  <text x="134" y="156" font-family="Arial" font-size="18" fill="#2D6B4F" text-anchor="middle">✓</text>
  <text x="165" y="156" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="19" fill="#EEEEEE">Capa protetora instalada no banco traseiro</text>
  
  <!-- Item 2 -->
  <rect x="120" y="182" width="28" height="28" rx="5" fill="#2D6B4F" opacity="0.2" stroke="#2D6B4F" stroke-width="2"/>
  <text x="134" y="203" font-family="Arial" font-size="18" fill="#2D6B4F" text-anchor="middle">✓</text>
  <text x="165" y="203" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="19" fill="#EEEEEE">Cinto/guia de segurança pet disponível</text>
  
  <!-- Item 3 -->
  <rect x="120" y="229" width="28" height="28" rx="5" fill="#2D6B4F" opacity="0.2" stroke="#2D6B4F" stroke-width="2"/>
  <text x="134" y="250" font-family="Arial" font-size="18" fill="#2D6B4F" text-anchor="middle">✓</text>
  <text x="165" y="250" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="19" fill="#EEEEEE">Desinfetante veterinário no veículo</text>
  
  <!-- Item 4 -->
  <rect x="120" y="276" width="28" height="28" rx="5" fill="#2D6B4F" opacity="0.2" stroke="#2D6B4F" stroke-width="2"/>
  <text x="134" y="297" font-family="Arial" font-size="18" fill="#2D6B4F" text-anchor="middle">✓</text>
  <text x="165" y="297" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="19" fill="#EEEEEE">Janelas fechadas ou abertura mínima</text>
  
  <!-- Item 5 -->
  <rect x="120" y="323" width="28" height="28" rx="5" fill="#2D6B4F" opacity="0.2" stroke="#2D6B4F" stroke-width="2"/>
  <text x="134" y="344" font-family="Arial" font-size="18" fill="#2D6B4F" text-anchor="middle">✓</text>
  <text x="165" y="344" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="19" fill="#EEEEEE">Ar-condicionado funcionando</text>
  
  <!-- Item 6 -->
  <rect x="120" y="370" width="28" height="28" rx="5" fill="#2D6B4F" opacity="0.2" stroke="#2D6B4F" stroke-width="2"/>
  <text x="134" y="391" font-family="Arial" font-size="18" fill="#2D6B4F" text-anchor="middle">✓</text>
  <text x="165" y="391" font-family="Inter, Arial, sans-serif" font-weight="500" font-size="19" fill="#EEEEEE">Sem objetos soltos no banco traseiro</text>
  
  <!-- Destaque foto obrigatória -->
  <rect x="120" y="420" width="720" height="50" rx="8" fill="#1F1A10" stroke="#B8942E" stroke-width="2"/>
  <text x="150" y="450" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="17" fill="#B8942E">📸  FOTO OBRIGATÓRIA do pet enviada à Central antes de iniciar</text>
  
  <!-- Footer reforçado -->
  <rect x="0" y="490" width="960" height="50" fill="#111111"/>
  <rect x="0" y="490" width="960" height="1" fill="#B8942E" opacity="0.4"/>
  <text x="480" y="520" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="13" fill="#B8942E" text-anchor="middle" letter-spacing="3">KAVIAR PET — TREINAMENTO OBRIGATÓRIO</text>
  <rect x="0" y="537" width="960" height="3" fill="#B8942E"/>
</svg>
