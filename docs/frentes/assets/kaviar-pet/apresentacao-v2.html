<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAVIAR Pet — Vídeo 2: Higiene, Atendimento e Responsabilidade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Inter, Arial, sans-serif; }
.container { position: relative; width: 960px; max-width: 100vw; }
.slide { display: none; width: 100%; }
.slide.active { display: block; }
.slide img, .slide object { width: 100%; height: auto; }
.controls { display: flex; gap: 20px; margin-top: 16px; align-items: center; }
button { background: #B8942E; color: #1A1A1A; border: none; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; border-radius: 4px; letter-spacing: 1px; }
button:hover { background: #D4A843; }
button:disabled { background: #333; color: #666; cursor: not-allowed; }
.counter { color: #999; font-size: 14px; letter-spacing: 1px; }
.title { color: #B8942E; font-size: 12px; letter-spacing: 3px; margin-bottom: 12px; font-weight: 600; }
</style>
</head>
<body>
<div class="title">KAVIAR PET — TREINAMENTO VÍDEO 2</div>
<div class="container">
<div class="slide active"><object data="slides-v2/01-capa.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/02-introducao.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/03-higienizacao.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/04-sujeira-extraordinaria.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/05-atendimento-tutor.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/06-central.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/07-responsabilidades.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/08-nao-fazer-1.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/09-nao-fazer-2.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/10-corporativo.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/11-selo-beneficios.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/12-quem-responsavel.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/13-posicionamento.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/14-resumo.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/15-proximos-passos.svg" type="image/svg+xml"></object></div>
<div class="slide"><object data="slides-v2/16-encerramento.svg" type="image/svg+xml"></object></div>
</div>
<div class="controls">
<button id="prev" disabled>← Anterior</button>
<span class="counter"><span id="current">1</span> / 16</span>
<button id="next">Próximo →</button>
</div>
<script>
const slides = document.querySelectorAll('.slide');
let idx = 0;
function show(i) {
  slides[idx].classList.remove('active');
  idx = i;
  slides[idx].classList.add('active');
  document.getElementById('current').textContent = idx + 1;
  document.getElementById('prev').disabled = idx === 0;
  document.getElementById('next').disabled = idx === slides.length - 1;
}
document.getElementById('prev').onclick = () => show(idx - 1);
document.getElementById('next').onclick = () => show(idx + 1);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); if (idx < slides.length - 1) show(idx + 1); }
  if (e.key === 'ArrowLeft') { if (idx > 0) show(idx - 1); }
});
</script>
</body>
</html>
