<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A1A"/>
      <stop offset="100%" style="stop-color:#2A2A2A"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>
  
  <!-- Linha dourada superior -->
  <rect x="0" y="0" width="960" height="3" fill="#B8942E"/>
  
  <!-- Logo compacto (canto superior esquerdo) -->
  <g transform="translate(40, 25)">
    <path d="M12 0 L24 5 L24 20 C24 30 18 36 12 40 C6 36 0 30 0 20 L0 5 Z" 
          fill="none" stroke="#B8942E" stroke-width="1.5"/>
    <circle cx="12" cy="20" r="3" fill="#B8942E"/>
    <circle cx="7" cy="14" r="2" fill="#B8942E"/>
    <circle cx="17" cy="14" r="2" fill="#B8942E"/>
    <circle cx="9" cy="9" r="1.8" fill="#B8942E"/>
    <circle cx="15" cy="9" r="1.8" fill="#B8942E"/>
  </g>
  <text x="72" y="45" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="16" fill="#FFFFFF" letter-spacing="2">KAVIAR</text>
  <text x="155" y="45" font-family="Montserrat, Arial, sans-serif" font-weight="300" font-size="16" fill="#B8942E" letter-spacing="1">Pet</text>
  
  <!-- Conteúdo central -->
  <text x="480" y="200" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="42" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">TREINAMENTO OBRIGATÓRIO</text>
  
  <!-- Separador -->
  <line x1="330" y1="225" x2="630" y2="225" stroke="#B8942E" stroke-width="2"/>
  
  <!-- Subtítulo -->
  <text x="480" y="270" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="24" fill="#B8942E" text-anchor="middle">Vídeo 1: Segurança e Condução de Pets</text>
  
  <!-- Selo pequeno centralizado -->
  <g transform="translate(445, 300)">
    <circle cx="35" cy="35" r="32" fill="none" stroke="#B8942E" stroke-width="1.5"/>
    <path d="M35 10 L52 17 L52 38 C52 50 44 56 35 62 C26 56 18 50 18 38 L18 17 Z" 
          fill="none" stroke="#B8942E" stroke-width="1"/>
    <circle cx="35" cy="36" r="4" fill="#B8942E"/>
    <circle cx="29" cy="28" r="2.5" fill="#B8942E"/>
    <circle cx="41" cy="28" r="2.5" fill="#B8942E"/>
    <circle cx="32" cy="23" r="2" fill="#B8942E"/>
    <circle cx="38" cy="23" r="2" fill="#B8942E"/>
  </g>
  
  <!-- Texto inferior - contraste melhorado -->
  <text x="480" y="420" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="16" fill="#999999" text-anchor="middle" letter-spacing="1">Assista até o final — depois responda o questionário</text>
  
  <!-- Footer reforçado -->
  <rect x="0" y="490" width="960" height="50" fill="#111111"/>
  <rect x="0" y="490" width="960" height="1" fill="#B8942E" opacity="0.4"/>
  <text x="480" y="520" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="13" fill="#B8942E" text-anchor="middle" letter-spacing="3">KAVIAR PET — OPERAÇÃO CERTIFICADA DE TRANSPORTE PET</text>
  
  <!-- Linha dourada inferior -->
  <rect x="0" y="537" width="960" height="3" fill="#B8942E"/>
</svg>
