<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <!-- Fundo escuro -->
  <rect width="600" height="200" fill="#1A1A1A"/>
  
  <!-- KAVIAR - texto principal -->
  <text x="80" y="115" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="64" fill="#FFFFFF" letter-spacing="4">KAVIAR</text>
  
  <!-- Pet - texto secundário, peso leve -->
  <text x="420" y="115" font-family="Montserrat, Arial, sans-serif" font-weight="300" font-size="64" fill="#B8942E" letter-spacing="2">Pet</text>
  
  <!-- Pata minimalista integrada como ponto do "i" - sutil -->
  <!-- Pequena pata geométrica posicionada sobre o ponto do i de KAVIAR -->
  <circle cx="257" cy="72" r="4" fill="#B8942E"/>
  <circle cx="249" cy="68" r="2.5" fill="#B8942E"/>
  <circle cx="265" cy="68" r="2.5" fill="#B8942E"/>
  <circle cx="253" cy="62" r="2.5" fill="#B8942E"/>
  <circle cx="261" cy="62" r="2.5" fill="#B8942E"/>
  
  <!-- Linha inferior sutil -->
  <line x1="80" y1="135" x2="520" y2="135" stroke="#B8942E" stroke-width="1" opacity="0.4"/>
  
  <!-- Subtítulo -->
  <text x="80" y="160" font-family="Inter, Arial, sans-serif" font-weight="400" font-size="14" fill="#4A4A4A" letter-spacing="3">TRANSPORTE PET COM OPERAÇÃO ASSISTIDA</text>
</svg>
