<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Fundo -->
  <rect width="400" height="400" fill="#1A1A1A"/>
  
  <!-- Círculo externo dourado -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#B8942E" stroke-width="3.5"/>
  
  <!-- Escudo central -->
  <path d="M200 65 L265 88 L265 165 C265 215 237 248 200 272 C163 248 135 215 135 165 L135 88 Z" 
        fill="#222222" stroke="#B8942E" stroke-width="2.5"/>
  
  <!-- Pata dentro do escudo -->
  <g transform="translate(168, 105)">
    <ellipse cx="32" cy="48" rx="15" ry="13" fill="#B8942E"/>
    <circle cx="15" cy="28" r="8" fill="#B8942E"/>
    <circle cx="49" cy="28" r="8" fill="#B8942E"/>
    <circle cx="23" cy="13" r="7" fill="#B8942E"/>
    <circle cx="41" cy="13" r="7" fill="#B8942E"/>
  </g>
  
  <!-- Texto KAVIAR PET - maior, mais legível -->
  <text x="200" y="42" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle" letter-spacing="5">KAVIAR PET</text>
  
  <!-- Texto MOTORISTA -->
  <text x="200" y="315" font-family="Montserrat, Arial, sans-serif" font-weight="700" font-size="20" fill="#FFFFFF" text-anchor="middle" letter-spacing="4">MOTORISTA</text>
  
  <!-- Texto CERTIFICADO -->
  <text x="200" y="342" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="18" fill="#B8942E" text-anchor="middle" letter-spacing="5">CERTIFICADO</text>
  
  <!-- Estrelas + ano com melhor contraste -->
  <text x="155" y="375" font-family="Arial" font-size="16" fill="#B8942E">★</text>
  <text x="200" y="377" font-family="Montserrat, Arial, sans-serif" font-weight="600" font-size="14" fill="#CCCCCC" text-anchor="middle" letter-spacing="2">2026</text>
  <text x="237" y="375" font-family="Arial" font-size="16" fill="#B8942E">★</text>
</svg>
